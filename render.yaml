version: "1"
services:
  - type: web
    name: cybershield-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DB_NAME
        value: cybershield
      - key: PYTHON_VERSION
        value: 3.10.0
